# Render Blueprint 配置（可选，手动创建也行）

databases:
  - name: campus-second-hand-db
    plan: free
    databaseName: campus_second_hand
    user: campus_second_hand

services:
  - type: web
    name: campus-second-hand
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn campus_second_hand.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-second-hand-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: WEB_CONCURRENCY
        value: "2"
