<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校园二手交易平台{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --blue: #2563eb;
            --orange: #f97316;
            --bg: #f7f9fc;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #334155;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .navbar-custom {
            background-color: #ffffff;
            box-shadow: 0 1px 8px rgba(37,99,235,0.06);
            padding: 10px 0;
        }
        .navbar-custom .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--blue);
            text-decoration: none;
        }
        .nav-link-custom {
            font-size: 0.92rem;
            color: #475569 !important;
            padding: 6px 16px !important;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .nav-link-custom:hover {
            background-color: rgba(37,99,235,0.06);
            color: var(--blue) !important;
        }
        .btn-outline-orange {
            border: 1.5px solid var(--orange);
            color: var(--orange);
            border-radius: 20px;
            padding: 5px 20px;
            font-size: 0.9rem;
            background: transparent;
            transition: all 0.25s;
        }
        .btn-outline-orange:hover {
            background-color: var(--orange);
            color: #fff;
        }
        .btn-solid-orange {
            background-color: var(--orange);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 6px 22px;
            font-size: 0.9rem;
            transition: all 0.25s;
        }
        .btn-solid-orange:hover {
            background-color: #ea580c;
            color: #fff;
        }

        .handdrawn-icon {
            display: inline-block;
            vertical-align: middle;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .banner-section {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }
        .banner-section h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #1e293b;
        }
        .banner-section .sub {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .banner-illustration {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.25;
        }
        .banner-illustration.left { left: 5%; }
        .banner-illustration.right { right: 5%; }

        .category-nav {
            background: #fff;
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 28px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .category-nav .cats {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cat-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #475569;
            text-decoration: none;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .cat-item:hover {
            background: rgba(37,99,235,0.08);
            color: var(--blue);
        }
        .cat-active {
            background: rgba(37,99,235,0.12) !important;
            color: var(--blue) !important;
            font-weight: 600;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 4px 14px;
            gap: 6px;
        }
        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.85rem;
            width: 130px;
            padding: 4px 0;
        }
        .search-box input::placeholder { color: #94a3b8; }

        .goods-card {
            background: #fff;
            border: none;
            border-radius: 14px;
            box-shadow: var(--card-shadow);
            transition: transform 0.28s ease, box-shadow 0.28s ease;
            position: relative;
            overflow: hidden;
        }
        .goods-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .goods-card .card-img-top {
            height: 170px;
            object-fit: cover;
            border-radius: 14px 14px 0 0;
            background: #f8fafc;
        }
        .goods-card .card-body { padding: 12px 14px 14px; }
        .goods-card .card-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .goods-card .price {
            color: var(--orange);
            font-weight: 700;
            font-size: 1.05rem;
        }
        .goods-card .date {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .deco-corner {
            position: absolute;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .deco-corner img { display: block; }

        .scatter-deco {
            position: absolute;
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }

        footer {
            background: #fff;
            color: #94a3b8;
            font-size: 0.85rem;
            padding: 22px 0;
            text-align: center;
            border-top: 1px solid #eef2f6;
            margin-top: auto;
        }

        .auth-container { max-width: 420px; margin: 50px auto; }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
        }
        .auth-card .card-body { padding: 36px 32px; }
        .auth-card .form-control {
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .auth-card .form-control:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
        }
        .auth-card .form-label { font-size: 0.85rem; color: #64748b; }

        @media (max-width: 768px) {
            .banner-section h1 { font-size: 1.4rem; }
            .banner-illustration { display: none; }
            .category-nav { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100px; }
            .goods-card .card-img-top { height: 130px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body style="position: relative;">

    <!-- full-screen background decorations -->
    <svg class="scatter-deco" style="top:6%;left:3%;" width="48" height="48" viewBox="0 0 48 48" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.35">
        <path d="M12 22h24v18a2 2 0 01-2 2H14a2 2 0 01-2-2V22z"/><path d="M10 22c0-4 28-4 28 0"/>
        <path d="M18 16c0-2 3-4 6-4s6 2 6 4v6"/>
    </svg>
    <svg class="scatter-deco" style="top:10%;right:2%;" width="36" height="36" viewBox="0 0 40 40" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.35">
        <circle cx="20" cy="12" r="6"/><path d="M6 32c0-6 28-6 28 0"/><path d="M14 24h12" opacity="0.4"/>
    </svg>
    <svg class="scatter-deco" style="top:22%;left:12%;" width="34" height="34" viewBox="0 0 36 36" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.30">
        <rect x="6" y="14" width="24" height="16" rx="3"/><path d="M6 20h24"/><path d="M14 26h8" opacity="0.4"/>
    </svg>
    <svg class="scatter-deco" style="top:28%;right:8%;" width="42" height="42" viewBox="0 0 44 44" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.35">
        <rect x="10" y="8" width="24" height="30" rx="2"/><path d="M10 16h24"/><path d="M16 24h12" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:38%;left:5%;" width="28" height="28" viewBox="0 0 30 30" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.30">
        <path d="M8 10L15 6l7 4v10l-7 4-7-4z"/><path d="M15 6v10" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:44%;right:4%;" width="32" height="32" viewBox="0 0 34 34" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.30">
        <path d="M6 10l11-4 11 4v12l-11 4-11-4z"/><path d="M17 6v12"/>
    </svg>
    <svg class="scatter-deco" style="top:55%;left:10%;" width="38" height="38" viewBox="0 0 40 40" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.35">
        <rect x="8" y="12" width="24" height="20" rx="2"/><path d="M8 16h24"/><rect x="14" y="22" width="12" height="4" rx="1" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:60%;right:10%;" width="30" height="30" viewBox="0 0 32 32" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.30">
        <circle cx="16" cy="10" r="5"/><path d="M6 26c0-5 20-5 20 0"/><rect x="12" y="18" width="8" height="3" rx="1" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:72%;left:6%;" width="44" height="44" viewBox="0 0 46 46" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.35">
        <rect x="10" y="8" width="26" height="30" rx="2"/><path d="M10 14h26"/><rect x="16" y="20" width="14" height="3" rx="1" opacity="0.4"/>
        <rect x="16" y="27" width="14" height="3" rx="1" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:78%;right:5%;" width="28" height="28" viewBox="0 0 28 28" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.30">
        <path d="M8 20L14 8l6 12z" opacity="0.4"/><path d="M14 8v12" opacity="0.4"/>
    </svg>
    <svg class="scatter-deco" style="top:88%;left:9%;" width="36" height="36" viewBox="0 0 36 36" stroke="#2563eb" stroke-width="1.2" fill="none" opacity="0.35">
        <circle cx="18" cy="18" r="10"/><path d="M18 8v20M8 18h20"/>
    </svg>
    <svg class="scatter-deco" style="top:92%;right:3%;" width="26" height="26" viewBox="0 0 26 26" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.30">
        <rect x="5" y="5" width="16" height="16" rx="2"/><circle cx="13" cy="13" r="3" opacity="0.3"/>
    </svg>
    <svg class="scatter-deco" style="top:48%;left:50%;transform:translate(-50%,-50%);" width="22" height="22" viewBox="0 0 22 22" stroke="#2563eb" stroke-width="1" fill="none" opacity="0.22">
        <path d="M4 11h14M11 4v14"/>
    </svg>
    <svg class="scatter-deco" style="top:50%;left:30%;" width="18" height="18" viewBox="0 0 18 18" stroke="#f97316" stroke-width="1" fill="none" opacity="0.22">
        <circle cx="9" cy="9" r="4"/>
    </svg>



    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="brand" href="{% url 'goods:goods' %}">
                <svg width="32" height="32" viewBox="0 0 48 48" stroke="#2563eb" stroke-width="1.8" fill="none" class="handdrawn-icon">
                    <path d="M14 22h20v18a2 2 0 01-2 2H16a2 2 0 01-2-2V22z"/>
                    <path d="M12 22c0-6 4-10 12-10s12 4 12 10"/>
                    <path d="M18 16c0-3 3-5 6-5s6 2 6 5" stroke-width="1.4"/>
                    <path d="M20 30h8v5h-8z" stroke="#f97316" stroke-width="1.4" opacity="0.7"/>
                    <path d="M16 36h16" stroke-width="1" opacity="0.4"/>
                </svg>
                校园二手交易平台
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="{% url 'goods:goods' %}">首页</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="{% url 'goods:publish' %}">发布商品</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="{% url 'orders:my_orders' %}">我的订单</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/logout/">退出登录</a>
                    </li>
                    <li class="nav-item">
                        <span class="d-inline-flex align-items-center gap-1 px-3 py-1" style="white-space:nowrap;font-size:0.92rem;color:#475569;">
                            <svg width="14" height="14" viewBox="0 0 24 24" stroke="#f97316" stroke-width="1.4" fill="none" class="handdrawn-icon"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-6 16-6 16 0"/></svg>
                            您好，{{ user.username }}
                        </span>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="btn btn-outline-orange me-1" href="{% url 'login' %}">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-solid-orange" href="{% url 'register' %}">注册</a>
                    </li>
                    {% endif %}
                    <li class="nav-item ms-lg-2">
                        <svg width="26" height="26" viewBox="0 0 48 48" stroke="#94a3b8" stroke-width="1.6" fill="none" class="handdrawn-icon">
                            <path d="M14 20c0-8 20-8 20 0v4c0 4-2 6-4 8v6a2 2 0 01-2 2H20a2 2 0 01-2-2v-6c-2-2-4-4-4-8v-4z"/>
                            <path d="M20 12c0-2 4-2 4 0" stroke-width="1"/>
                            <path d="M18 42h12" stroke-width="1.2" opacity="0.4"/>
                        </svg>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3" style="position: relative; z-index: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p class="mb-0">校园二手交易平台 &copy; sola661 版权所有</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
